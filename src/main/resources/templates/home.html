<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>QR Code App - Menu Utama</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(to right, #e6f4ea, #d4efdf); /* hijau lembut */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        h1 {
            font-size: 36px;
            color: #2e7d32; /* hijau tua */
            margin-bottom: 10px;
        }

        .subtitle {
            font-family: 'Great Vibes', cursive;
            font-size: 34px;
            color: #1b5e20; /* kaligrafi hijau gelap */
            margin-bottom: 40px;
        }

        .button-container {
            display: flex;
            gap: 30px;
            margin-top: 20px;
        }

        .menu-btn {
            padding: 18px 36px;
            background: #4CAF50; /* hijau stabil */
            color: white;
            text-decoration: none;
            font-size: 20px;
            border-radius: 14px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .menu-btn:hover {
            background: #388e3c; /* hijau lebih tua saat hover */
            transform: scale(1.05);
        }

        @media (max-width: 600px) {
            .button-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<h1>Selamat Datang di Aplikasi Scan & Generate QR Code</h1>
<div class="subtitle">Pernikahan Atin & Taufiq</div>

<div class="button-container">
    <a class="menu-btn" th:href="@{/scan}">Scan QR Code</a>
    <a class="menu-btn" th:href="@{/generate/qrcode}">Generate QR Code</a>
</div>

</body>
</html>
