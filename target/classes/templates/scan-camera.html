<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"><head>
    <title>Scan QR Code via Kamera</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: url('/images/bg-image.jpg') no-repeat center center fixed;
            background-size: cover;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: #ffffff;
            padding: 2.5rem 2rem;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0, 128, 96, 0.15);
            text-align: center;
            max-width: 520px;
            width: 90%;
        }

        h1 {
            color: #059669;
            font-size: 1.9rem;
            margin-bottom: 1.2rem;
        }

        #reader {
            width: 100%;
            max-width: 400px;
            height: 320px;
            margin: 0 auto;
        }

        #result {
            display: none;
            margin-top: 1.5rem;
            font-size: 1rem;
            color: #065f46;
            background-color: #d1fae5;
            padding: 1rem;
            border-radius: 10px;
            border: 1px solid #6ee7b7;
        }

        .label {
            font-weight: 600;
            color: #047857;
        }

        .back-button {
            display: none;
            margin-top: 2rem;
            padding: 0.6rem 1.4rem;
            background-color: #34d399;
            color: white;
            border: none;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }

        .back-button:hover {
            background-color: #059669;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Scan Kehadiran Tamu</h1>
    <div id="reader"></div>
    <div id="result"></div>
    <a href="/scan" class="back-button">⬅ Kembali</a>
</div>

<script>
        function formatDateTime(date) {
            const day = String(date.getDate()).padStart(2, '0');

            const monthNames = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agu", "Sep", "Okt", "Nov", "Des"];
            const month = monthNames[date.getMonth()];

            const year = date.getFullYear();

            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            const seconds = String(date.getSeconds()).padStart(2, '0');

            return `${day}-${month}-${year} ${hours}:${minutes}:${seconds}`;
        }

        function onScanSuccess(decodedText) {
            const now = new Date();
            const waktuKedatangan = formatDateTime(now);
            document.getElementById('result').style.display = "block";
            document.querySelector('.back-button').style.display = "inline-block";

            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `
                <div><span class="label">📦 Hasil Scan:</span><br>${decodedText}</div>
                <div style="margin-top: 0.8rem;"><span class="label">⏰ Jam Kedatangan:</span><br>${waktuKedatangan}</div>
            `;
            resultDiv.style.display = "block";
            document.getElementById('reader').style.display = "none";

            // Kirim data ke API backend
            fetch('/api/scan/save', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    hasil: decodedText,
                    waktu: waktuKedatangan
                })
            })
                .then(response => {
                    if (!response.ok) {
                        throw new Error("Gagal menyimpan data ke server");
                    }
                    return response.json();
                })
                .then(data => {
                    console.log("Data berhasil disimpan:", data);
                })
                .catch(error => {
                    console.error("Error saat menyimpan:", error);
                });

            html5QrcodeScanner.clear();
            /*setTimeout(() => {
                window.location.href = "/scan";
            }, 10000);*/

    }

    // const html5QrcodeScanner = new Html5QrcodeScanner(
    //     "reader", { fps: 10, qrbox: 250 });

        const html5QrcodeScanner = new Html5QrcodeScanner(
            "reader",
            {
                fps: 10,
                qrbox: { width: 300, height: 300 }
            }
        );

    html5QrcodeScanner.render(onScanSuccess);
</script>
</body>
</html>
