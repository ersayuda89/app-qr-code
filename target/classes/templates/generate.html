<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Pernikahan Atin & Taufiq</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: url('/images/bg-image.jpg') no-repeat center center fixed;
            background-size: cover;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.92);
            padding: 2.5rem 3rem;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 128, 96, 0.25);
            max-width: 550px;
            width: 90%;
            text-align: center;
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 2.6rem;
            margin-bottom: 0.3rem;
            color: #34d399;
        }

        h2 {
            font-size: 1.2rem;
            color: #4b5563;
            margin-bottom: 1.5rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 0.8rem 1rem;
            font-size: 1rem;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            margin-bottom: 1rem;
            transition: border 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: #10b981;
            outline: none;
        }

        button {
            background-color: #34d399;
            color: white;
            padding: 0.75rem 2rem;
            font-size: 1rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #10b981;
        }

        img {
            margin-top: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            max-width: 100%;
            height: auto;
        }

        .download-button {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.6rem 1.4rem;
            background-color: #10b981;
            color: white;
            border-radius: 10px;
            font-weight: bold;
            text-decoration: none;
            transition: background-color 0.3s ease;
        }

        .download-button:hover {
            background-color: #047857;
        }

        .qr-download-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin-top: 1.5rem;
        }

        .qr-card {
            background: white;
            padding: 1rem;
            border-radius: 16px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
            display: inline-block;
        }
    </style>
</head>
<body>
<div class="container">
    <h1 style="font-family: ui-sans-serif !important;color: mediumslateblue;">Resepsi Pernikahan</h1>
    <h1>Atin & Taufiq</h1>
    <h2>Cetak QRCODE Kehadiran</h2>

    <form method="post" action="/generate/qrcode">
        <input type="text" name="text" placeholder="Masukkan Nama Tamu Undangan ..." required />
        <br>
        <button type="submit">🎉 Generate QR Code</button>
    </form>
    <div th:if="${qrImage}">
        <div class="qr-download-wrapper">
            <div class="qr-card">
                <img th:src="'data:image/png;base64,' + ${qrImage}" alt="QR Code"/>
                <div style="text-align:center; margin-top:0.5rem;"></div>
                <a th:href="'data:image/png;base64,' + ${qrImage}"
                   th:download="'qrcode-' + ${text} + '.png'"
                   class="download-button"
                   style="margin-top: 1rem; display: inline-block;">
                    ⬇ Download QR Code
                </a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
